# ============================================================================
# Application stack — centralized CD (see apps/README.md).
#
# All services below are [MIGRATED]: reconciled to mirror each repo's previous
# GitHub CI `docker run` and deployed FROM HERE via deploy.sh. Image tags come
# from versions.env; runtime config/secrets come from per-service env/<svc>.env.
# If a future [UNVERIFIED] placeholder is added, do NOT deploy it from here
# until it is reconciled against that service's real deploy.
# ============================================================================
services:
  # [MIGRATED] Mirrors quantFinance CI deploy: quant-network, API port 3001,
  # extra_hosts, logs volume, portfolio-research shared volume, log rotation,
  # and env/quant-api.env injected as process environment (the image excludes
  # .env, so no /app/.env bind mount is needed).
  # NOTE: quant-api / quant-mcp-read / quant-mcp-actions / quant-scheduler all
  # share the same quant-api image, so they share ${QUANT_API_IMAGE_TAG}.
  quant-api:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-api
    restart: unless-stopped
    env_file:
      - env/quant-api.env
    environment:
      TZ: Asia/Shanghai
      ENABLE_EMBEDDED_SCHEDULER: "false"
      ENABLE_MCP_SERVER: "false"
      # API_WORKERS is intentionally NOT set here: an environment: entry would
      # override env_file and, since it can only interpolate from versions.env
      # (deploy.sh passes only --env-file versions.env), always resolve to the
      # default. Configure API_WORKERS in env/quant-api.env instead.
      PORTFOLIO_RESEARCH_REPORT_DIR: /app/reports/portfolio-research
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3001:3001"
    volumes:
      - ./logs/quant-api:/app/logs
      - portfolio_research:/app/reports/portfolio-research
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Optional MCP read server. It remains behind the "mcp" profile to
  # preserve current production default (DEPLOY_MCP=false).
  quant-mcp-read:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-mcp-read
    restart: unless-stopped
    profiles: ["mcp"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3002", "--workers", "1", "--log-level", "info"]
    env_file:
      - env/quant-api.env
    environment:
      TZ: Asia/Shanghai
      ENABLE_EMBEDDED_SCHEDULER: "false"
      ENABLE_MCP_SERVER: "true"
      MCP_SERVER_MODE: read
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3002:3002"
    volumes:
      - ./logs/quant-api:/app/logs
    networks:
      - quant-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3002/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Optional MCP actions server. It remains behind the "mcp" profile
  # to preserve current production default (DEPLOY_MCP=false).
  quant-mcp-actions:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-mcp-actions
    restart: unless-stopped
    profiles: ["mcp"]
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3003", "--workers", "1", "--log-level", "info"]
    env_file:
      - env/quant-api.env
    environment:
      TZ: Asia/Shanghai
      ENABLE_EMBEDDED_SCHEDULER: "false"
      ENABLE_MCP_SERVER: "true"
      MCP_SERVER_MODE: actions
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "3003:3003"
    volumes:
      - ./logs/quant-api:/app/logs
    networks:
      - quant-net
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3003/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Mirrors quantFinance CI scheduler container. It is deployed
  # together with quant-api in v1; MCP remains opt-in through the "mcp" profile.
  quant-scheduler:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-scheduler
    restart: unless-stopped
    command: ["python", "scheduler_runner.py"]
    env_file:
      - env/quant-api.env
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-api:/app/logs
    networks:
      - quant-net
    healthcheck:
      test: ["CMD-SHELL", "python tools/check_scheduler_health.py"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Mirrors CI deploy: quant-network, HTTP/HTTPS ports, TLS cert
  # mount, and Nginx upstream env vars moved into env/quant-web.env.
  quant-web:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:${QUANT_DASHBOARD_IMAGE_TAG:-latest}
    container_name: quant-web
    restart: unless-stopped
    env_file:
      - env/quant-web.env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/nginx/cert:/etc/nginx/cert:ro
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Scoring-only role from the stock-scoring-system image. It keeps
  # daily stock scoring and manual backfills separate from portfolio research
  # and plan generation. Post-deploy DB maintenance still runs once via
  # apps/hooks/quant-scorer-post.sh (ensure_portfolio_indexes +
  # seed_portfolio_param_presets).
  quant-scorer:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-scorer:${QUANT_SCORER_IMAGE_TAG:-latest}
    container_name: quant-scorer
    restart: unless-stopped
    command: ["/app/start.scorer.sh"]
    env_file:
      - env/common.env
      - env/quant-scorer.env
    environment:
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-scorer:/app/logs
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Portfolio research role from the stock-scoring-system image.
  # It consumes research jobs and writes reports to the shared volume read by
  # quant-api.
  quant-researcher:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-scorer:${QUANT_SCORER_IMAGE_TAG:-latest}
    container_name: quant-researcher
    restart: unless-stopped
    command: ["/app/start.researcher.sh"]
    env_file:
      - env/common.env
      - env/quant-scorer.env
    environment:
      - TZ=Asia/Shanghai
      - PORTFOLIO_RESEARCH_REPORT_DIR=/app/reports/portfolio-research
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-researcher:/app/logs
      - portfolio_research:/app/reports/portfolio-research
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Portfolio planning and paper-trading role from the
  # stock-scoring-system image. It owns plan-generation polling and paper
  # execution/mark-to-market cron jobs.
  quant-portfolio:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-scorer:${QUANT_SCORER_IMAGE_TAG:-latest}
    container_name: quant-portfolio
    restart: unless-stopped
    command: ["/app/start.portfolio.sh"]
    env_file:
      - env/common.env
      - env/quant-scorer.env
    environment:
      - TZ=Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-portfolio:/app/logs
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Deployed via infra CD (deploy.sh). Mirrors the current CI deploy
  # faithfully: network_mode: host, logs volume + log rotation, layered env.
  # The DB is remote (another machine); MONGO_URI in common.env points there.
  # The image dockerignores .env, so config comes purely from injected env vars
  # (no /app/.env mount needed).
  quant-data-engine:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-data-engine:${QUANT_DATA_ENGINE_IMAGE_TAG:-latest}
    container_name: quant-data-engine
    restart: unless-stopped
    network_mode: host
    env_file:
      - env/common.env
      - env/quant-data-engine.env
    volumes:
      - ./logs/quant-data-engine:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Mirrors CI deploy: add-host for same-host API calls, cache
  # volume, log rotation, layered env.
  backtest-worker:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:${BACKTEST_WORKER_IMAGE_TAG:-latest}
    container_name: backtest-worker
    restart: unless-stopped
    env_file:
      - env/common.env
      - env/backtest-worker.env
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backtest_cache:/app/cache
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] N replicas controlled by QUANT_ANALYZER_REPLICAS in versions.env
  # (default 4). deploy.sh reads that variable and passes --scale automatically,
  # so changing the replica count is a one-line edit in versions.env.
  # WORKER_ID is not set here; it falls back to the container hostname, which
  # is unique per scaled instance (see quantAnalyzer/src/.../main.py line 37).
  # The optional quant_data_engine source-code mount used in CI for debugging
  # is omitted — code ships in the image.
  quant-analyzer:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-analyzer:${QUANT_ANALYZER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - env/common.env
      - env/quant-analyzer.env
    environment:
      TZ: Asia/Shanghai
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-analyzer:/app/logs
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Mirrors CI deploy: quant-network, extra_hosts, API port 5001:5000,
  # logs volume, log rotation, layered env. The old /home/deployuser/quantFinance/.env
  # file is replaced by common.env + quant-strategy-manager.env.
  quant-strategy-manager:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-strategy-manager:${QUANT_STRATEGY_MANAGER_IMAGE_TAG:-latest}
    container_name: quant-strategy-manager
    restart: unless-stopped
    env_file:
      - env/common.env
      - env/quant-strategy-manager.env
    environment:
      TZ: Asia/Shanghai
      API_PORT: "5000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "5001:5000"
    volumes:
      - ./logs/quant-strategy-manager:/app/quant-strategy-manager/logs
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

volumes:
  # Shared between quant-researcher and quant-api (portfolio research reports).
  portfolio_research:
    driver: local
  # backtest-worker job cache (strategy code, data frames, etc.)
  backtest_cache:
    driver: local

networks:
  quant-net:
    external: true
    # 指向 infra 创建的全局网络
    name: quant-network
