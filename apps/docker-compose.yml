# ============================================================================
# Application stack — being migrated to centralized CD (see apps/README.md).
#
# SOURCE OF TRUTH during migration: each repo's GitHub CI deploy job (the real
# `docker run` on the production host). Services marked [MIGRATED] below have
# been reconciled to that behavior and are deployed FROM HERE via deploy.sh.
# UNVERIFIED services are aspirational placeholders kept for tag parameterization
# only — do NOT deploy them from here until reconciled against their CI deploy.
# ============================================================================
services:
  # [UNVERIFIED] not reconciled against CI deploy yet.
  # NOTE: quant-api / quant-mcp / quant-mcp-actions / quant-scheduler all share
  # the same quant-api image, so they share ${QUANT_API_IMAGE_TAG}.
  quant-api:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "3001:3001"
    networks:
      - quant-net

  quant-mcp:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-mcp-read
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3002", "--workers", "1", "--log-level", "info" ]
    restart: unless-stopped
    env_file: .env
    environment:
      - ENABLE_EMBEDDED_SCHEDULER=false
      - ENABLE_MCP_SERVER=true
      - MCP_SERVER_MODE=read
    ports:
      - "3002:3002"
    networks:
      - quant-net

  quant-mcp-actions:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-mcp-actions
    command: [ "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "3003", "--workers", "1", "--log-level", "info" ]
    restart: unless-stopped
    env_file: .env
    environment:
      - ENABLE_EMBEDDED_SCHEDULER=false
      - ENABLE_MCP_SERVER=true
      - MCP_SERVER_MODE=actions
    ports:
      - "3003:3003"
    networks:
      - quant-net

  quant-scheduler:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-api:${QUANT_API_IMAGE_TAG:-latest}
    container_name: quant-scheduler
    command: [ "python", "scheduler_runner.py" ]
    restart: unless-stopped
    env_file: .env
    networks:
      - quant-net

  quant-web:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-dashboard:${QUANT_DASHBOARD_IMAGE_TAG:-latest}
    container_name: quant-web
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
      - "443:443"
    networks:
      - quant-net

  # [MIGRATED] Mirrors CI deploy: add-host for same-host quant-api calls,
  # logs volume, shared portfolio-research volume. Post-deploy DB maintenance
  # runs via apps/hooks/quant-scorer-post.sh (ensure_portfolio_indexes +
  # seed_portfolio_param_presets).
  quant-scorer:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-scorer:${QUANT_SCORER_IMAGE_TAG:-latest}
    container_name: quant-scorer
    restart: unless-stopped
    env_file:
      - env/common.env
      - env/quant-scorer.env
    environment:
      - TZ=Asia/Shanghai
      - PORTFOLIO_RESEARCH_REPORT_DIR=/app/reports/portfolio-research
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-scorer:/app/logs
      - portfolio_research:/app/reports/portfolio-research
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # [MIGRATED] Deployed via infra CD (deploy.sh). Mirrors the current CI deploy
  # faithfully: network_mode: host, logs volume + log rotation, layered env.
  # The DB is remote (another machine); MONGO_URI in common.env points there.
  # The image dockerignores .env, so config comes purely from injected env vars
  # (no /app/.env mount needed).
  quant-data-engine:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-data-engine:${QUANT_DATA_ENGINE_IMAGE_TAG:-latest}
    container_name: quant-data-engine
    restart: unless-stopped
    network_mode: host
    env_file:
      - env/common.env
      - env/quant-data-engine.env
    volumes:
      - ./logs/quant-data-engine:/app/logs
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  backtest-worker:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/backtest-worker:${BACKTEST_WORKER_IMAGE_TAG:-latest}
    container_name: backtest-worker
    restart: unless-stopped
    env_file: .env
    networks:
      - quant-net

  # [MIGRATED] 4 replicas mirroring the CI deploy loop. All share the same
  # log dir and env files; each container gets a unique WORKER_ID (also falls
  # back to container hostname if not set). The optional quant_data_engine
  # source-code mount used in CI for debugging is omitted here — code ships
  # in the image.
  # YAML anchor keeps the 4 service blocks DRY.
  x-analyzer-base: &analyzer-base
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-analyzer:${QUANT_ANALYZER_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - env/common.env
      - env/quant-analyzer.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./logs/quant-analyzer:/app/logs
    networks:
      - quant-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  quant-analyzer-1:
    <<: *analyzer-base
    container_name: quant-analyzer-1
    environment:
      TZ: Asia/Shanghai
      WORKER_ID: analyzer-1

  quant-analyzer-2:
    <<: *analyzer-base
    container_name: quant-analyzer-2
    environment:
      TZ: Asia/Shanghai
      WORKER_ID: analyzer-2

  quant-analyzer-3:
    <<: *analyzer-base
    container_name: quant-analyzer-3
    environment:
      TZ: Asia/Shanghai
      WORKER_ID: analyzer-3

  quant-analyzer-4:
    <<: *analyzer-base
    container_name: quant-analyzer-4
    environment:
      TZ: Asia/Shanghai
      WORKER_ID: analyzer-4

  quant-strategy-manager:
    image: crpi-gv3f6mfcrw75qane.cn-hangzhou.personal.cr.aliyuncs.com/wukongquant/quant-strategy-manager:${QUANT_STRATEGY_MANAGER_IMAGE_TAG:-latest}
    container_name: quant-strategy-manager
    restart: unless-stopped
    env_file: .env
    ports:
      - "5001:5000"
    networks:
      - quant-net

volumes:
  # Shared between quant-scorer and quant-api (portfolio research reports).
  # quant-api mounts this once it is migrated; until then it uses its own
  # host path — use the same named volume on migration to avoid data split.
  portfolio_research:
    driver: local

networks:
  quant-net:
    external: true
    # 指向 infra 创建的全局网络
    name: quant-network
