apiVersion: v1
kind: Service
metadata:
  name: quant-analyzer
  namespace: quant-finance
  labels:
    app: quant-analyzer
spec:
  clusterIP: None
  selector:
    app: quant-analyzer
  # Headless service for StatefulSet pod DNS only (workers may not listen on TCP).
  ports:
    - name: noop
      port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: quant-analyzer
  namespace: quant-finance
  labels:
    app: quant-analyzer
spec:
  serviceName: quant-analyzer
  replicas: 2
  selector:
    matchLabels:
      app: quant-analyzer
  template:
    metadata:
      labels:
        app: quant-analyzer
    spec:
      containers:
        - name: analyzer
          image: quant-analyzer:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: quant-config
            - secretRef:
                name: quant-secrets
          env:
            - name: WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: MONGO_DB
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: MONGO_DB
          volumeMounts:
            - name: logs
              mountPath: /app/logs
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "4"
              memory: "4Gi"
      volumes:
        - name: logs
          emptyDir: {}
