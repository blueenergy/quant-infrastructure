apiVersion: apps/v1
kind: Deployment
metadata:
  name: backtest-worker
  namespace: quant-finance
  labels:
    app: backtest-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backtest-worker
  template:
    metadata:
      labels:
        app: backtest-worker
    spec:
      containers:
        - name: worker
          image: backtest-worker:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: quant-config
            - secretRef:
                name: quant-secrets
          env:
            - name: MONGO_DB
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: MONGO_DB
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: MONGO_DB
            - name: BACKTEST_DB_NAME
              valueFrom:
                secretKeyRef:
                  name: quant-secrets
                  key: MONGO_DB
            - name: BACKTEST_WORKER_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: cache
              mountPath: /app/cache
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
      volumes:
        - name: cache
          emptyDir: {}
