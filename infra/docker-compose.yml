# 迁入 infra/ 后，Compose 默认项目名会由目录名变成 "infra"，导致命名卷
# 从 quant-infrastructure_* 变成 infra_*（等于换了空卷，看似丢数据）。
# 用 name: 显式钉死项目名，卷名与迁移前保持一致。
name: quant-infrastructure

services:
  # ========================
  # MongoDB 数据库
  # ========================
  mongodb:
    image: mongo:7.0
    container_name: quant-mongodb
    hostname: mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-changeme}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-finance}
    volumes:
      - mongodb7_data:/data/db
      - mongodb7_config:/data/configdb
      - ./mongodb/mongod.conf:/etc/mongod.conf:ro
      - ./mongodb/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    command: mongod --config /etc/mongod.conf --auth
    mem_limit: 4096m          # 4GB 限制
    mem_reservation: 800m     # 预留 800MB
    cpus: '2.0'               # 限制 2 核
    restart: unless-stopped
    networks:
      - quant-network
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet -u \"$${MONGO_INITDB_ROOT_USERNAME}\" -p \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval \"db.adminCommand('ping')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ========================
  # Redis 内存数据库
  # ========================
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    hostname: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    mem_limit: 512m           # 512MB 限制
    mem_reservation: 100m     # 预留 100MB
    cpus: '0.5'               # 限制 0.5 核
    restart: unless-stopped
    networks:
      - quant-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ========================
  # Prometheus 监控（可选）
  # ========================
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    mem_limit: 200m
    cpus: '0.5'
    restart: unless-stopped
    networks:
      - quant-network
    profiles:
      - monitoring

  # ========================
  # Grafana 可视化（可选）
  # ========================
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_INSTALL_PLUGINS: grafana-clock-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    mem_limit: 200m
    cpus: '0.5'
    restart: unless-stopped
    networks:
      - quant-network
    profiles:
      - monitoring
    depends_on:
      - prometheus

  # ========================
  # Hermes Agent 网关
  # ========================
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    #ports:
      # 根路径 / 常为 404；OpenAI 兼容接口在 /v1/*，须带 Authorization: Bearer <API_SERVER_KEY>
    #  - "8642:8642"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python3 -c "import os,urllib.request; k=os.environ[\"API_SERVER_KEY\"]; r=urllib.request.Request(\"http://127.0.0.1:8642/v1/models\", headers={\"Authorization\": \"Bearer \"+k}); urllib.request.urlopen(r, timeout=5).read()"',
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    volumes:
      - ./hermes-data:/opt/data
    environment:
      - TZ=Asia/Shanghai
      # LLM 凭证和模型路由由 hermes-data/config.yaml 管理。
      # 宿主机与其它容器访问网关 OpenAI 兼容 API 时需 0.0.0.0 + 密钥。
      - API_SERVER_ENABLED=${HERMES_API_SERVER_ENABLED:-true}
      - API_SERVER_HOST=0.0.0.0
      - API_SERVER_KEY=${HERMES_API_SERVER_KEY:-dev-hermes-api-key-change-me}

    command: ["gateway", "run"]
    networks:
      - quant-network
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ========================
  # Hermes Web Dashboard
  # ========================
  # 勿与 gateway 共用 latest：Hub 上 latest 曾不含 dashboard 子命令导致容器反复重启。
  hermes-dashboard:
    image: nousresearch/hermes-agent:v2026.4.23
    container_name: hermes-dashboard
    restart: unless-stopped
    # 无 --insecure 时多版本仅绑 127.0.0.1，宿主机 port 映射无法连上；仅私网/受信环境用 --insecure。
    command: ["dashboard", "--host", "0.0.0.0", "--port", "9119", "--no-open", "--insecure"]
    ports:
      - "9119:9119"
    volumes:
      - ./hermes-data:/opt/data
    environment:
      - TZ=Asia/Shanghai
      # 同网络下用服务名访问 gateway 健康检查与状态。
      - GATEWAY_HEALTH_URL=http://hermes:8642
      - GATEWAY_HEALTH_TIMEOUT=5
    depends_on:
      hermes:
        condition: service_healthy
    networks:
      - quant-network
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "2"

  # ========================
  # Portainer 容器管理（可选）
  # ========================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: quant-portainer
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    mem_limit: 200m
    cpus: '0.5'
    restart: unless-stopped
    networks:
      - quant-network
    profiles:
      - management

# ========================
# 数据卷
# ========================
volumes:
  mongodb7_data:
    driver: local
  mongodb7_config:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  portainer_data:
    driver: local

# ========================
# 网络
# ========================
networks:
  quant-network:
    name: quant-network
    driver: bridge
