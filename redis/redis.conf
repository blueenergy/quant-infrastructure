# Redis 7.x config
# Optimized for quant trading system (4GB RAM machine)

# ========================
# Network
# ========================
bind 0.0.0.0
port 6379
tcp-backlog 128
timeout 300
tcp-keepalive 60

# ========================
# Memory Management
# ========================
maxmemory 400mb
maxmemory-policy allkeys-lru        # LRU eviction policy

# ========================
# Persistence
# ========================
# AOF persistence (recommended)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec                # sync every second
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# RDB snapshot (disabled, AOF only)
save ""

# ========================
# Security
# ========================
# Password auth (via env var)
# requirepass ${REDIS_PASSWORD}

# ========================
# Performance
# ========================
# Client connections
maxclients 100

# Data structure optimization
list-max-ziplist-size -2
list-compress-depth 1
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# ========================
# Logging
# ========================
loglevel notice
logfile ""                          # output to stdout

# ========================
# Slow Query Log
# ========================
slowlog-log-slower-than 10000       # log ops > 10ms
slowlog-max-len 128

# ========================
# Advanced
# ========================
databases 16
always-show-logo no
notify-keyspace-events ""
